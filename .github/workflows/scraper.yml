name: Gerador de Mangá em PDF

on:
  workflow_dispatch:

jobs:
  build-and-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências do Sistema (Display Virtual)
        # Instala um monitor falso para o Chrome fantasma funcionar sem erros
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Instalar dependências do Python
        run: pip install -r requirements.txt

      - name: Executar o Scraper e Gerar PDF
        # Roda o script dentro do display virtual (xvfb-run)
        run: xvfb-run python gerar_manga.py

      - name: Salvar PDF como Artefato
        uses: actions/upload-artifact@v4
        if: success() 
        with:
          name: manga-pdf-artefato
          path: '*.pdf' 
          retention-days: 7